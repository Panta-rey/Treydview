<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TreydView</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/klinecharts@9.8.12/dist/umd/klinecharts.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="brand-mark">ᴪ</span><span class="brand-name">TreydView</span></div>

  <!-- Asset-Dropdown -->
  <div class="dropdown" id="assetDropdown">
    <button class="dd-trigger" id="assetTrigger">
      <span id="assetLabel">BTC/USDT</span>
      <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel" id="assetPanel">
      <input class="dd-search" id="assetSearch" placeholder="Suchen… z.B. TAO" autocomplete="off">
      <div class="dd-list" id="assetList"></div>
    </div>
  </div>

  <!-- Vergleichs-Assets hinzufügen -->
  <div class="dropdown" id="compareDropdown">
    <button class="dd-trigger dd-compare" id="compareTrigger" title="Asset zum Vergleich hinzufügen">
      <span>+ Vergleich</span>
    </button>
    <div class="dd-panel" id="comparePanel">
      <input class="dd-search" id="compareSearch" placeholder="Asset hinzufügen…" autocomplete="off">
      <div class="dd-list" id="compareList"></div>
      <div class="compare-active" id="compareActive"></div>
    </div>
  </div>

  <!-- Timeframe-Dropdown -->
  <div class="dropdown" id="tfDropdown">
    <button class="dd-trigger" id="tfTrigger">
      <span id="tfLabel">1D</span>
      <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel" id="tfPanel">
      <div class="dd-list" id="tfList"></div>
    </div>
  </div>

  <!-- Indikatoren-Dropdown -->
  <div class="dropdown" id="indDropdown">
    <button class="dd-trigger" id="indTrigger">
      <span>Indikatoren</span>
      <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel dd-panel--wide" id="indPanel">
      <div class="dd-list" id="indList"></div>
    </div>
  </div>

  <!-- Chart-Typ-Toggle (Kerzen / Linie) mit Stil-Einstellungen -->
  <div class="dropdown" id="typeDropdown">
    <button class="dd-trigger" id="typeTrigger">
      <span id="typeLabel">Kerzen</span>
      <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel" id="typePanel">
      <div class="dd-list" id="typeList"></div>
    </div>
  </div>

  <!-- Aktions-Buttons rechtsbündig -->
  <div class="topbar-actions">
    <!-- Pattern-Erkennung -->
    <div class="dropdown" id="patternDropdown">
      <button class="action-btn" id="patternTrigger" title="Chart-Muster erkennen">
        <svg viewBox="0 0 24 24" class="ab-icon">
          <polyline points="2,18 6,8 10,14 14,8 18,16 22,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="8" r="1.8" fill="currentColor" stroke="none"/>
          <circle cx="14" cy="8" r="1.8" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <div class="dd-panel dd-panel--right" id="patternPanel">
        <div class="pat-header">Muster-Erkennung</div>
        <div class="pat-row">
          <label>Strenge</label>
          <select id="patStrictness">
            <option value="streng" selected>Streng</option>
            <option value="mittel">Mittel</option>
            <option value="locker">Locker</option>
          </select>
        </div>
        <div class="pat-warn hidden" id="patWarn">
          Lockere Einstellungen finden auch im Zufallsrauschen Muster.
        </div>
        <div class="pat-info">
          Erkennt aktuell: Double Top / Double Bottom im sichtbaren Bereich.
        </div>
        <div class="pat-actions">
          <button id="patternBtn" class="pat-scan">Scannen</button>
          <button id="patternClearBtn" class="pat-clear">Löschen</button>
        </div>
      </div>
    </div>

    <!-- Layouts -->
    <div class="dropdown" id="layoutDropdown">
      <button class="action-btn" id="layoutTrigger" title="Layouts">
        <svg viewBox="0 0 24 24" class="ab-icon">
          <rect x="3" y="3" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <rect x="13" y="3" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <rect x="3" y="13" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <rect x="13" y="13" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <div class="dd-panel dd-panel--right" id="layoutPanel">
        <div class="layout-save">
          <input type="text" id="layoutName" placeholder="Layout-Name…" autocomplete="off">
          <button id="layoutSaveBtn" title="Aktuelles Layout speichern">Speichern</button>
        </div>
        <div class="dd-list" id="layoutList"></div>
      </div>
    </div>

    <!-- Theme -->
    <button class="action-btn" id="themeBtn" title="Hell / Dunkel">
      <svg viewBox="0 0 24 24" class="ab-icon" id="themeIcon">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Watchlist (Auge) -->
    <button class="action-btn" id="wlToggleBtn" title="Watchlist ein-/ausblenden">
      <svg viewBox="0 0 24 24" class="ab-icon">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>

    <button class="action-btn" id="autoZoomBtn" title="Auto-Zoom auf sichtbaren Bereich">
      <svg viewBox="0 0 24 24" class="ab-icon">
        <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="action-btn" id="screenshotBtn" title="Screenshot speichern">
      <svg viewBox="0 0 24 24" class="ab-icon">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="12" cy="13" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>

    <div class="live-badge" id="liveBadge">
      <span class="dot"></span><span id="liveText">–</span>
    </div>
  </div>
</header>

<div class="workspace">
  <!-- Zeichenwerkzeuge -->
  <aside class="drawbar" id="drawbar"></aside>

  <div class="chart-col">
    <!-- Preis-Header -->
    <div class="price-header">
      <span class="ph-symbol" id="phSymbol">–</span>
      <span class="ph-price" id="phPrice">–</span>
      <span class="ph-change" id="phChange">–</span>
    </div>

    <!-- Chart-Legende (einklappbar) -->
    <div class="chart-legend" id="chartLegend">
      <button class="legend-toggle" id="legendToggle" title="Beschriftung ein-/ausklappen">▾</button>
      <div class="legend-body" id="legendBody"></div>
    </div>

    <!-- Haupt-Chart (RSI/VOL laufen als synchronisierte Panes darin) -->
    <div id="mainChart" class="main-chart"></div>


    <div class="statusline" id="statusline">Lade …</div>
  </div>

  <!-- Watchlist -->
  <aside class="watchlist" id="watchlist">
    <div class="wl-header">
      <span class="wl-title">Watchlist</span>
      <button class="wl-add" id="wlAddBtn" title="Symbol hinzufügen">+</button>
    </div>
    <div class="wl-search hidden" id="wlSearchBox">
      <input type="text" id="wlSearch" placeholder="Symbol suchen…" autocomplete="off">
      <div class="wl-results" id="wlResults"></div>
    </div>
    <div class="wl-list" id="wlList"></div>
  </aside>
</div>

<!-- Indikator-Einstellungs-Panel -->
<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span id="settingsTitle">Einstellungen</span>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
    <div class="settings-footer">
      <button class="btn-apply" id="settingsApply">Übernehmen</button>
    </div>
  </div>
</div>

<!-- Chart-Stil-Panel (Kerzen-/Linienfarben) -->
<div class="chartstyle-menu hidden" id="chartStyleMenu">
  <div class="csm-header">Chart-Darstellung</div>

  <div class="csm-section" id="csmCandleSection">
    <div class="csm-title">Kerzen</div>
    <div class="csm-row">
      <label>Steigend</label>
      <input type="color" id="csUpColor" value="#3fb68b">
    </div>
    <div class="csm-row">
      <label>Fallend</label>
      <input type="color" id="csDownColor" value="#d05e5e">
    </div>
    <div class="csm-row">
      <label><input type="checkbox" id="csHollow"> Hohl (nur Umriss)</label>
    </div>
  </div>

  <div class="csm-section hidden" id="csmLineSection">
    <div class="csm-title">Linie</div>
    <div class="csm-row">
      <label>Linienfarbe</label>
      <input type="color" id="csLineColor" value="#e8b64c">
    </div>
    <div class="csm-row">
      <label>Stärke</label>
      <input type="number" id="csLineWidth" value="2" min="1" max="5">
    </div>
    <div class="csm-row">
      <label><input type="checkbox" id="csAreaFill" checked> Fläche füllen</label>
    </div>
    <div class="csm-row" id="csmFillOpacityRow">
      <label>Deckkraft <span id="csFillOpacityVal">15%</span></label>
      <input type="range" id="csFillOpacity" min="0" max="60" value="15">
    </div>
  </div>

  <div class="csm-actions">
    <button id="csResetBtn" class="csm-reset">Standard</button>
    <button id="csApplyBtn" class="csm-ok">Übernehmen</button>
  </div>
</div>

<!-- Generisches Overlay-Kontextmenü (Einzellöschen) -->
<div class="overlay-menu hidden" id="overlayMenu">
  <button id="overlayDelete" class="overlay-menu-del">✕ Löschen</button>
</div>

<!-- FRVP-Kontextmenü -->
<div class="frvp-menu hidden" id="frvpMenu">
  <div class="frvp-menu-header">FRVP Einstellungen</div>
  <div class="frvp-row">
    <label>Row Size</label>
    <input type="number" id="frvpRows" value="150" min="10" max="500">
  </div>
  <div class="frvp-row">
    <label>Value Area %</label>
    <input type="number" id="frvpVA" value="70" min="10" max="100">
  </div>
  <div class="frvp-row">
    <label>Breite %</label>
    <input type="number" id="frvpWidth" value="30" min="5" max="80">
  </div>
  <div class="frvp-divider"></div>
  <div class="frvp-row">
    <label>Up-Farbe</label>
    <input type="color" id="frvpColorUp" value="#3fb68b">
  </div>
  <div class="frvp-row">
    <label>Down-Farbe</label>
    <input type="color" id="frvpColorDown" value="#d05e5e">
  </div>
  <div class="frvp-divider"></div>
  <div class="frvp-row">
    <label><input type="checkbox" id="frvpShowVAH" checked> VAH</label>
    <input type="color" id="frvpColorVAH" value="#e8b64c">
  </div>
  <div class="frvp-row">
    <label><input type="checkbox" id="frvpShowVAL" checked> VAL</label>
    <input type="color" id="frvpColorVAL" value="#e8b64c">
  </div>
  <div class="frvp-row">
    <label><input type="checkbox" id="frvpShowPOC" checked> POC (gestrichelt)</label>
    <input type="color" id="frvpColorPOC" value="#ffffff">
  </div>
  <div class="frvp-menu-actions">
    <button id="frvpDelete" class="frvp-del">Löschen</button>
    <button id="frvpApply" class="frvp-ok">Übernehmen</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/indicators.js"></script>
<script src="js/overlays.js"></script>
<script src="js/data.js"></script>
<script src="js/settings.js"></script>
<script src="js/patterns.js"></script>
<script src="js/app.js"></script>
</body>
</html>
